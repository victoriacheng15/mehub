projects:
  - title: LLM Telemetry Gateway
    emoji: 📡
    shortDescription: AIOps engine with PII masking monitoring a Go completions proxy and Python sidecar over UDS, utilizing a local Ollama LLM for automated root cause analysis on metric anomalies and chaos faults. 
    link: llm-telemetry-gateway
    techs:
      - Go
      - Python
      - Kubernetes
      - Prometheus
      - Grafana
      - OpenTelemetry
      - Chaos Engineering (Chaos Mesh)
      - Ollama
  - title: Uptime Monitor
    emoji: 🛡️
    shortDescription: Serverless Go project on AWS that monitors multiple websites hourly with Lambda and EventBridge, stores status history in S3, and deploys infrastructure with Terraform and GitHub Actions.
    link: uptime-monitor
    techs:
      - Go
      - AWS
      - Terraform
      - GitHub Actions
      - BDD (Cucumber/Godog)
  - title: Cover Craft
    emoji: 🎨
    shortDescription: TypeScript/React cover image generator with Azure Web Apps and Functions, automated deployment via GitHub Actions CI/CD, queue-based async processing, WCAG validation, telemetry, and analytics.
    link: cover-craft
    techs:
      - TypeScript
      - React (Next.js)
      - Azure
      - GitHub Actions
      - MongoDB Atlas
  - title: Dev Toolchain
    emoji: 🛠️
    shortDescription: A portable library of reusable AI agent skills and helper scripts, structured under the SKILL.md open standard to orchestrate consistent developer workflows across compatible LLM clients. 
    link: dev-toolchain
    techs:
      - Automation
      - Bash
      - Agentic Enablement
      - Developer Workflows
  - title: Observability Hub
    emoji: 📊
    shortDescription: End-to-end Kubernetes observability system using Terraform and GitOps, with OpenTelemetry, eBPF networking, MCP diagnostics, HA data services, and incident workflows including ADRs and RCAs.
    link: observability-hub
    techs:
      - ArgoCD
      - Kubernetes
      - Terraform
      - Observability
      - OpenTelemetry
      - PostgreSQL
      - eBPF

