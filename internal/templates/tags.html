{{ define "content" }}
<div class="flex flex-col gap-10">
    <h1 class="text-3xl font-bold text-violet-400">Tags</h1>
    
    <ul class="grid grid-cols-2 sm:grid-cols-3 gap-4 list-none m-0 p-0">
        {{ range .Tags }}
        <li>
            <a href="{{ $.PathPrefix }}tags/{{ . }}.html" 
               class="flex flex-col items-center justify-center gap-2 p-6 bg-slate-900 border border-slate-800 rounded-xl hover:border-violet-500/30 transition-all group">
                <span class="text-xl font-bold text-slate-200 group-hover:text-violet-400 transition-colors">#{{ . }}</span>
                <span class="text-sm text-slate-500 font-bold uppercase tracking-wider">{{ index $.TagCounts . }} posts</span>
            </a>
        </li>
        {{ end }}
    </ul>
</div>
{{ end }}
