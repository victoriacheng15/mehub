name: Continuous Integration

on:
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**/*.go'
      - 'internal/**/*.go'
      - 'e2e/**/*'
      - 'go.mod'
      - 'go.sum'
      - '**/*.md'
      - 'scripts/**/*.py'
  workflow_dispatch:

env:
  go-version: '1.26'
  node-version: '24'
  python-version: '3.12'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      e2e: ${{ steps.filter.outputs.e2e }}
      python: ${{ steps.filter.outputs.python }}
      markdown: ${{ steps.filter.outputs.markdown }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            go:
              - 'cmd/**/*.go'
              - 'internal/**/*.go'
              - 'go.mod'
              - 'go.sum'
            markdown:
              - '**/*.md'
            e2e:
              - 'e2e/**/*'
              - 'go.mod'
              - 'go.sum'
            python:
              - 'scripts/**/*.py'

  check:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.go-version }}

      - name: Run Format Check
        run: make vet

  test:
    runs-on: ubuntu-latest
    needs: [changes, check]
    if: ${{ needs.changes.outputs.go == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.go-version }}

      - name: Run Tests
        run: make test

  test-bdd:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.e2e == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.go-version }}

      - name: Run BDD Tests
        run: make test-bdd

  python-check:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ env.python-version }}

      - name: Run Syntax Check
        run: python3 -m py_compile scripts/fetch_contributions.py
  markdownlint:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.markdown == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.node-version }}

      - name: Run Markdown Lint
        run: make md-lint