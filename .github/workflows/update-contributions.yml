name: Update Contributions

on:
  schedule:
    - cron: '30 0 * * 2,6'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  PYTHON_VERSION: '3.12'
  PROJECTS_YAML_PATH: internal/templates/contents/projects.yaml
  UPDATE_MESSAGE: 'chore(contribution): update open source contributions'

jobs:
  update-contributions:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set branch name
        run: echo "BRANCH_NAME=chore/update-contributions-$(date +%s)" >> "$GITHUB_ENV"

      - name: Fetch latest contributions
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_BLOG_TOKEN }}
        run: python3 scripts/fetch_contributions.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- "$PROJECTS_YAML_PATH"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push contribution updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git checkout -B "$BRANCH_NAME"
          git add "$PROJECTS_YAML_PATH"
          git commit -m "$UPDATE_MESSAGE"
          git push --force-with-lease origin "$BRANCH_NAME"

      - name: Open or update contribution update pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh pr view "$BRANCH_NAME" --base main --json number --jq .number >/dev/null 2>&1; then
            echo "Pull request already exists for $BRANCH_NAME."
          else
            gh pr create \
              --base main \
              --head "$BRANCH_NAME" \
              --title "$UPDATE_MESSAGE" \
              --body "Updates the open source contributions section in projects.yaml. Generated by scripts/fetch_contributions.py."
          fi
