root    = "."
tmp_dir = ".air-tmp"

[build]
  cmd = "go build -o .air-tmp/server ./cmd/server"
  bin = ".air-tmp/server"

  include_ext = ["go", "html", "md", "css", "yaml", "yml", "toml"]
  include_dir = ["cmd", "internal", "blog"]
  exclude_dir = ["dist", ".git", ".air-tmp"]

  kill_delay = "200ms"
  delay      = 500

[log]
  time = true

[misc]
  clean_on_exit = true
